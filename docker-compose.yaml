version: "3.8"

services:
  db:
    image: postgis/postgis:15-3.4
    container_name: postgres
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/1-init.sql
      - ./db/ny_tax_backup.sql:/docker-entrypoint-initdb.d/2-backup.sql

  backend:
    build: ./backend
    container_name: backend
    restart: always
    depends_on:
      - db
    env_file:
      - ./backend/.env
    ports:
      - "3000:3000"

  client:
    build: ./client
    container_name: client
    restart: always
    depends_on:
      - backend
    env_file:
      - ./client/.env
    ports:
      - "5173:5173"

volumes:
  postgres_data:
